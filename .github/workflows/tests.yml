name: Unit Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project "One Day Diet.xcodeproj" \
            -scheme "One Day Diet" \
            -destination "platform=iOS Simulator,name=Any iOS Simulator Device" \
            -only-testing:"One Day DietTests"
